<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <button id="theme-toggle" class="theme-toggle">Light Mode</button>
    
    <div class="container">
        <h1>Lotto Number Generator</h1>
        <div id="result" class="result"></div>
        <button id="generate" class="generate-btn">Generate Numbers</button>
    </div>

    <div class="form-container">
        <h2>Partnership Inquiry</h2>
        <form action="https://formspree.io/f/xdawldpn" method="POST">
            <div class="form-group">
                <input type="email" name="email" placeholder="Your Email" required>
            </div>
            <div class="form-group">
                <textarea name="message" placeholder="Your Message" required></textarea>
            </div>
            <button type="submit" class="submit-btn">Send Inquiry</button>
        </form>
    </div>

    <script src="main.js"></script>
</body>
</html>
